
# Spring Boot应用配置
spring.application.name=pet-management-system
server.port=8080

# SQLite数据库配置
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:${user.home}/.pet-management-system/pet_db.sqlite
spring.datasource.username=
spring.datasource.password=

# JPA配置
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 日志配置
logging.level.org.springframework=INFO
logging.level.com.pet.management=DEBUG
logging.file.name=${user.home}/.pet-management-system/logs/pet-management.log

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JavaFX配置
javafx.version=21
